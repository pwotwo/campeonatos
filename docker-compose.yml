services:
  postgres:
    image: postgres:15
    container_name: campeonatos_db
    environment:
      POSTGRES_USER: campeonatos
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: campeonatos_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: